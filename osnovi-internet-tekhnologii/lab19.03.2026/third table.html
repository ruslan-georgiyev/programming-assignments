<!DOCTYPE html>
<html>
<head>
<style>
table {
  font-family: arial, sans-serif;
  border-collapse: collapse;
  width: 100%;
  box-shadow:10px 10px;

}
th,td{
    border:1px solid #ddd;
    text-align:center;
}
tr:nth-child(even) {
  background-color: #8ecc23;
}
tr:nth-child(odd){
    background-color:#dc77c9
}

</style>
</head>
<body>


<table>
  <tr>
    <th>Ім'я</th>
    <th>Роки життя</th>
    <th>Основні теореми</th>
  </tr>
  <tr>
    <td>Георг Кантор</td>
    <td>3 березня 1845 - 6 січня 1918</td>
    <td>Побудова дійсних чисел за допомогою класів еквівалентності фундаментальних послідовностей Коші</td>
  </tr>
  <tr>
    <td>Карл Вейєрштрасс</td>
    <td>31 жовтня 1815 - 19 лютого 1897</td>
    <td>Теорема Больцано-Вейєрштрасса. Арифметична теорія дійсних чисел</td>
  </tr>
</table>

</body>
</html>
